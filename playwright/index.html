<!doctype html>
<html>
  <head>
    <title>ReDoc</title>
    <!-- needed for adaptive design -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,600|Source+Code+Pro:400:700"
      rel="stylesheet"
    />

    <!--
    ReDoc doesn't change outer page styles
    -->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="redoc_container"></div>
    <script type="module">
      import { init } from './bundle/redoc.standalone.js';

      const searchParams = new URLSearchParams(location.search);
      const hideInfoSection = searchParams.get('hideInfoSection');

      init(
        './openapi/petstore.yaml',
        {
          hideInfoSection,
          downloadUrls: [
            {
              url: 'http://redocly.com/definition.yaml',
              name: 'definition.yaml',
            },
            {
              url: 'http://redocly.com/definition.json',
              name: 'definition.json',
            },
          ],
        },
        document.getElementById('redoc_container'),
      );
    </script>
  </body>
</html>
