    Dispute:
      type: object
      properties:
        id:
          type: string
          description: ID of the dispute.
          readOnly: true
          maxLength: 50
          example: dp_0YVCE8J5F2DE58FV0S8YASW4HK
        customerId:
          description: ID of the customer who is disputing a transaction.
          type:
            - string
            - 'null'
          readOnly: true
          maxLength: 50
          example: cus_0YV7DDSDD1C8DA64KHH2W33CPF
        transactionId:
          description: ID of the disputed transaction.
          type:
            - string
            - 'null'
          maxLength: 50
          example: txn_0YVDTQJ8YWDGQACV2N2N5SPWQ0
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        amount:
          description: Dispute amount.
          type: number
          format: double
        acquirerReferenceNumber:
          description: Acquirer reference number for the dispute.
          type:
            - string
            - 'null'
        caseId:
          description: Case ID of the dispute.
          type:
            - string
            - 'null'
        reasonCode:
          description: >-
            Code used in the chargeback that describes the reason for the
            dispute.
          type:
            - string
            - 'null'
          maxLength: 255
        reasonDescription:
          description: Description of the reason for the dispute.
          type:
            - string
            - 'null'
          maxLength: 512
          readOnly: true
        category:
          description: Category of dispute.
          type: string
          readOnly: true
          enum:
            - fraud
            - authorization
            - processing-errors
            - consumer-disputes
            - uncategorized
            - bank-return
        type:
          description: Type of dispute.
          type: string
          enum:
            - information-request
            - first-chargeback
            - second-chargeback
            - arbitration
            - fraud
            - ethoca-alert
            - verifi-alert
            - bank-return
            - paypal-claim
        status:
          description: Status of the dispute.
          type: string
          enum:
            - response-needed
            - under-review
            - forfeited
            - won
            - lost
            - unknown
        postedTime:
          description: Date and time when the dispute is posted.
          type: string
          format: date-time
        deadlineTime:
          description: >-
            Latest date and time by when a merchant must submit a representment
            for a dispute.

            If the deadline is missed, the merchant loses the dispute.
          type:
            - string
            - 'null'
          format: date-time
        rawResponse:
          description: >-
            Raw response from the payment gateway that processed the disputed
            transaction.
          type:
            - string
            - 'null'
          readOnly: true
        resolvedTime:
          type:
            - string
            - 'null'
          format: date-time
          description: Date and time when the dispute is resolved.
          readOnly: true
        source:
          description: Source of the dispute.
          type:
            - string
            - 'null'
          readOnly: true
          enum:
            - null
            - api
            - manual
            - sftp
            - webhook
        revision:
          description: |-
            Number of times the dispute data has been modified.

            Use the revision number when analyzing webhook data to
            determine if a change should take precedence over the current
            representation.
          type: integer
          readOnly: true
        createdTime:
          $ref: '#/components/schemas/CreatedTime'
        updatedTime:
          $ref: '#/components/schemas/UpdatedTime'
        _links:
          type: array
          description: Related links.
          readOnly: true
          items:
            type: object
            properties:
              href:
                description: Link URL.
                type: string
              rel:
                description: Type of link.
                type: string
                enum:
                  - self
                  - transaction
                  - attachments
        _embedded:
          type: object
          description: Embedded objects that are requested by the `expand` query parameter.
          readOnly: true
          properties:
            transaction:
              type: object
    TransactionId:
      type: string
      description: ID of the transaction.
      maxLength: 50
      example: txn_0YVDTQJ8YWDGQACV2N2N5SPWQ0
    File:
      type: object
      properties:
        id:
          type: string
          description: ID of the file.
          readOnly: true
          maxLength: 50
          example: file_0YV7HZ7KDCC5WBV9Q7WRKG1H6N
        name:
          description: Original file name.
          type: string
        extension:
          description: File extension.
          type: string
        description:
          description: Description of the file.
          type: string
        sourceType:
          description: Source of the file.
          type:
            - string
            - 'null'
          enum:
            - upload
            - camera
            - organization-export
            - organization-closure-export
            - null
          example: upload
        tags:
          description: List of tags associated with the file.
          type: array
          items:
            type: string
        mime:
          description: MIME type of the file.
          type: string
          readOnly: true
          enum:
            - image/png
            - image/jpeg
            - image/gif
            - application/pdf
        size:
          description: File size, in bytes.
          type: integer
          readOnly: true
        width:
          description: Image width. This field applicable to images only.
          type: integer
          readOnly: true
        height:
          description: Image height. This field applicable to images only.
          type: integer
          readOnly: true
        sha1:
          description: Hash sum of the file.
          type: string
          readOnly: true
        exifData:
          description: >-
            Collection of EXIF tags contained in the image metadata. This field
            applicable to images only.
          type:
            - object
            - 'null'
          readOnly: true
          example:
            FileSize: 120
            Software: GIMP 2.4.5
        createdTime:
          $ref: '#/components/schemas/CreatedTime'
        updatedTime:
          $ref: '#/components/schemas/UpdatedTime'
        isPublic:
          description: >-
            Specifies if the file is available publicly without authentication.

            If this value is `true`, the permalink in the `_links` section
            contains the public URL.
          type: boolean
        _links:
          type: array
          description: Related links.
          readOnly: true
          items:
            type: object
            properties:
              href:
                description: Link URL.
                type: string
              rel:
                description: Type of link.
                type: string
                enum:
                  - self
                  - download
                  - signedLink
                  - permalink
