            - bank-account
            - bin
            - country
            - customer-id
            - email
            - email-domain
            - fingerprint
            - ip-address
            - payment-card
        value:
          type: string
          description: Value of the allowlist record.
        createdTime:
          $ref: '#/components/schemas/CreatedTime'
        updatedTime:
          $ref: '#/components/schemas/UpdatedTime'
