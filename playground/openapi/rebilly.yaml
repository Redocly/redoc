          type: number
          format: double
          default: 0
          x-type: Money
        unusedAmount:
          description: Unused credit memo amount that has not been allocated.
          readOnly: true
          type: number
          format: double
          default: 0
          x-type: Money
        revision:
          type: integer
          readOnly: true
          description: Number of times the credit memo has been modified.
        customerId:
          readOnly: true
          $ref: '#/components/schemas/CustomerId'
        currency:
          readOnly: true
          $ref: '#/components/schemas/CurrencyCode'
        invoiceId:
          type:
