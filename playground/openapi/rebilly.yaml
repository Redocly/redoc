        expiredTime:
          description: Date and time when the credential expires.
          type:
            - string
            - 'null'
          format: date-time
        _links:
          type: array
          description: Related links.
          readOnly: true
          items:
            type: object
            properties:
              href:
                description: Link URL.
                type: string
              rel:
                description: Type of link.
                type: string
                enum:
                  - self
                  - customer
    ArrayCustomField:
